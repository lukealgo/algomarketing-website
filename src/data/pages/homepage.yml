faq:
  eyebrow: "FAQ"
  heading: "Frequently Asked Questions"
  items:
    - question: "What is a contingent marketing workforce?"
      answer: "A flexible pool of marketing specialists who work on a temporary or project basis. They embed directly into your team, follow your processes, and deliver against your goals — without permanent headcount commitment. It gives you the ability to scale execution up or down based on actual demand."
    - question: "How is Algomarketing different from a staffing firm?"
      answer: "We're focused exclusively on marketing execution. Every specialist in our network is vetted for AI fluency, marketing expertise, and the ability to embed and deliver within enterprise environments. We don't just place people — we transform how your team works."
    - question: "Who are Algos?"
      answer: "AI-fluent marketing specialists who embed directly into your team. They bring deep expertise across demand generation, lifecycle marketing, RevOps, paid media, content, SEO, and marketing operations — enhanced by practical AI skills that multiply their output."
    - question: "How fast can we get started?"
      answer: "Most clients have specialists embedded within 2-3 weeks. We handle sourcing, vetting, onboarding, and compliance so you can move fast without cutting corners."
    - question: "What marketing roles can you provide?"
      answer: "Demand gen, lifecycle marketing, RevOps, paid media, content, SEO, marketing ops, and more. If it sits within the modern marketing function, we have specialists ready to deploy."
    - question: "How does the process work?"
      answer: "Book a call, tell us what you need, we recommend the right solution and handle sourcing, onboarding, and delivery. It's designed to be as simple as possible so you can focus on strategy while we handle execution."

cta:
  heading: "Start Scaling Marketing Without Hiring"
  subtext: "Tell us what you're trying to execute, and we'll recommend the right solution for your team."
