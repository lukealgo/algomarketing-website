title: "Privacy Policy"

body: |
  Last updated: March 2025

  ## 1. Introduction

  AlgoMarketing ("we", "our", or "us") is committed to protecting your privacy. This Privacy Policy explains how we collect, use, disclose, and safeguard your information when you visit our website.

  Company Registration: 10212066
  VAT Number: GB259152590

  ## 2. Information We Collect

  We may collect information that you provide directly to us, including:

  - Name, email address, phone number, and company information when you fill out our contact form
  - Job title and role information for service matching
  - Communications you send to us

  We may also automatically collect certain information when you visit our website, including your IP address, browser type, operating system, and browsing behaviour through cookies and similar technologies.

  ## 3. How We Use Your Information

  We use the information we collect to:

  - Respond to your enquiries and provide our services
  - Send you marketing communications (with your consent)
  - Improve our website and services
  - Comply with legal obligations

  ## 4. Legal Basis for Processing

  We process your personal data on the following legal bases under the UK GDPR:

  - **Consent:** Where you have given us consent to process your data for specific purposes
  - **Legitimate Interest:** Where processing is necessary for our legitimate business interests
  - **Contract:** Where processing is necessary for the performance of a contract

  ## 5. Data Sharing

  We do not sell your personal data. We may share your information with trusted third-party service providers who assist us in operating our website and conducting our business, subject to appropriate data processing agreements.

  ## 6. Data Retention

  We retain your personal data only for as long as necessary to fulfil the purposes for which it was collected, or as required by law.

  ## 7. Your Rights

  Under the UK GDPR, you have the right to:

  - Access your personal data
  - Rectify inaccurate data
  - Request erasure of your data
  - Restrict processing of your data
  - Data portability
  - Object to processing

  To exercise any of these rights, please contact us at the details below.

  ## 8. Cookies

  Our website uses cookies to enhance your browsing experience. You can control cookie preferences through your browser settings.

  ## 9. Contact Us

  If you have questions about this Privacy Policy, please contact us at:

  AlgoMarketing
  Email: privacy@algomarketing.co.uk
