  <!-- Wordmark -->
  <text x="600" y="290" font-family="Figtree, Arial, sans-serif" font-weight="600" font-size="64" text-anchor="middle">
    <tspan fill="url(#ogAlgoGradient)">algo</tspan><tspan fill="#FFFFFF">marketing</tspan>
