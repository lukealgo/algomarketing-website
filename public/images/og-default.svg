<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="ogAlgoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8A71EE"/>
      <stop offset="50%" stop-color="#1DCDFE"/>
      <stop offset="100%" stop-color="#1FE0BF"/>
    </linearGradient>
    <linearGradient id="ogAccentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8A71EE"/>
      <stop offset="50%" stop-color="#1DCDFE"/>
      <stop offset="100%" stop-color="#1FE0BF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
