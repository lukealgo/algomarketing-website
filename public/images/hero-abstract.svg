<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="gradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1FE0BF"/>
      <stop offset="100%" stop-color="#1DCDFE"/>
    </linearGradient>
    <linearGradient id="gradB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8A71EE"/>
      <stop offset="100%" stop-color="#1DCDFE"/>
    </linearGradient>
    <linearGradient id="gradC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1DCDFE"/>
      <stop offset="100%" stop-color="#1FE0BF"/>
    </linearGradient>
  </defs>

  <!-- Connecting lines -->
  <g stroke-width="1" opacity="0.15">
    <line x1="120" y1="150" x2="280" y2="200" stroke="#1FE0BF"/>
    <line x1="280" y1="200" x2="400" y2="120" stroke="#8A71EE"/>
    <line x1="400" y1="120" x2="550" y2="180" stroke="#1DCDFE"/>
    <line x1="550" y1="180" x2="680" y2="140" stroke="#1FE0BF"/>
    <line x1="280" y1="200" x2="320" y2="350" stroke="#1DCDFE"/>
    <line x1="320" y1="350" x2="200" y2="420" stroke="#8A71EE"/>
    <line x1="200" y1="420" x2="120" y2="150" stroke="#1FE0BF"/>
    <line x1="320" y1="350" x2="500" y2="380" stroke="#1FE0BF"/>
    <line x1="500" y1="380" x2="550" y2="180" stroke="#8A71EE"/>
    <line x1="500" y1="380" x2="650" y2="350" stroke="#1DCDFE"/>
    <line x1="650" y1="350" x2="680" y2="140" stroke="#1FE0BF"/>
    <line x1="200" y1="420" x2="350" y2="550" stroke="#1DCDFE"/>
    <line x1="350" y1="550" x2="500" y2="380" stroke="#8A71EE"/>
    <line x1="350" y1="550" x2="180" y2="620" stroke="#1FE0BF"/>
    <line x1="350" y1="550" x2="520" y2="600" stroke="#1DCDFE"/>
    <line x1="520" y1="600" x2="650" y2="350" stroke="#8A71EE"/>
    <line x1="520" y1="600" x2="680" y2="560" stroke="#1FE0BF"/>
    <line x1="680" y1="560" x2="650" y2="350" stroke="#1DCDFE"/>
    <line x1="180" y1="620" x2="300" y2="720" stroke="#8A71EE"/>
    <line x1="520" y1="600" x2="450" y2="720" stroke="#1FE0BF"/>
    <line x1="680" y1="560" x2="720" y2="680" stroke="#1DCDFE"/>
    <line x1="300" y1="720" x2="450" y2="720" stroke="#1FE0BF"/>
    <line x1="450" y1="720" x2="720" y2="680" stroke="#8A71EE"/>
    <line x1="400" y1="120" x2="320" y2="350" stroke="#1FE0BF"/>
    <line x1="650" y1="350" x2="680" y2="560" stroke="#8A71EE"/>
    <line x1="120" y1="150" x2="200" y2="420" stroke="#1DCDFE"/>
  </g>

  <!-- Primary nodes (green #1FE0BF) -->
  <circle cx="120" cy="150" r="8" fill="#1FE0BF" opacity="0.35"/>
  <circle cx="320" cy="350" r="12" fill="url(#gradA)" opacity="0.4"/>
  <circle cx="200" cy="420" r="6" fill="#1FE0BF" opacity="0.3"/>
  <circle cx="520" cy="600" r="10" fill="#1FE0BF" opacity="0.35"/>
  <circle cx="300" cy="720" r="5" fill="url(#gradC)" opacity="0.25"/>
  <circle cx="680" cy="140" r="7" fill="#1FE0BF" opacity="0.3"/>

  <!-- Secondary nodes (purple #8A71EE) -->
  <circle cx="280" cy="200" r="10" fill="#8A71EE" opacity="0.3"/>
  <circle cx="500" cy="380" r="14" fill="url(#gradB)" opacity="0.35"/>
  <circle cx="180" cy="620" r="6" fill="#8A71EE" opacity="0.25"/>
  <circle cx="720" cy="680" r="8" fill="#8A71EE" opacity="0.3"/>
  <circle cx="650" cy="350" r="9" fill="url(#gradB)" opacity="0.3"/>

  <!-- Tertiary nodes (blue #1DCDFE) -->
  <circle cx="400" cy="120" r="6" fill="#1DCDFE" opacity="0.3"/>
  <circle cx="550" cy="180" r="10" fill="url(#gradC)" opacity="0.35"/>
  <circle cx="350" cy="550" r="8" fill="#1DCDFE" opacity="0.3"/>
  <circle cx="680" cy="560" r="7" fill="#1DCDFE" opacity="0.25"/>
  <circle cx="450" cy="720" r="6" fill="url(#gradC)" opacity="0.3"/>

  <!-- Small accent dots -->
  <circle cx="160" cy="280" r="4" fill="#1FE0BF" opacity="0.2"/>
  <circle cx="460" cy="250" r="4" fill="#8A71EE" opacity="0.2"/>
  <circle cx="600" cy="260" r="4" fill="#1DCDFE" opacity="0.15"/>
  <circle cx="260" cy="490" r="4" fill="#1FE0BF" opacity="0.2"/>
  <circle cx="580" cy="480" r="4" fill="#8A71EE" opacity="0.15"/>
  <circle cx="400" cy="650" r="4" fill="#1DCDFE" opacity="0.2"/>
  <circle cx="150" cy="500" r="3" fill="#8A71EE" opacity="0.15"/>
  <circle cx="700" cy="450" r="3" fill="#1FE0BF" opacity="0.15"/>
  <circle cx="250" cy="660" r="3" fill="#1DCDFE" opacity="0.15"/>
  <circle cx="620" cy="650" r="3" fill="#8A71EE" opacity="0.15"/>

  <!-- Large faint background circles -->
  <circle cx="400" cy="400" r="20" fill="url(#gradA)" opacity="0.15"/>
  <circle cx="600" cy="200" r="16" fill="url(#gradB)" opacity="0.15"/>
  <circle cx="250" cy="600" r="18" fill="url(#gradC)" opacity="0.15"/>
</svg>
